<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gracias - TechLift Academy</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Fuente -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background: radial-gradient(circle at top, #111, #0d0d0d);
        color: #fff;
        font-family: "Poppins", sans-serif;
        overflow: hidden;
      }

      .container-box {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        flex-direction: column;
        animation: fadeIn 1s ease-in-out;
      }

      .check {
        font-size: 5rem;
        color: #0d6efd;
        animation: pop 0.6s ease;
      }

      h1 {
        font-size: 3rem;
        margin-top: 20px;
      }

      p {
        color: #bbb;
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .btn {
        padding: 12px 25px;
        font-size: 1.1rem;
        border-radius: 10px;
        transition: all 0.3s ease;
      }

      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(13, 110, 253, 0.4);
      }

      /* Animaciones */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pop {
        0% {
          transform: scale(0);
        }
        80% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      /* Glow background effect */
      .glow {
        position: absolute;
        width: 300px;
        height: 300px;
        background: #0d6efd;
        filter: blur(150px);
        opacity: 0.2;
        top: 10%;
        left: 20%;
      }

      .glow2 {
        position: absolute;
        width: 300px;
        height: 300px;
        background: #0d6efd;
        filter: blur(150px);
        opacity: 0.15;
        bottom: 10%;
        right: 20%;
      }
    </style>
  </head>

  <body>
    <!-- Efectos glow -->
    <div class="glow"></div>
    <div class="glow2"></div>

    <div class="container-box">
      <div class="check">✔</div>

      <h1>¡Registro exitoso!</h1>

      <p>
        Bienvenido a <strong>TechLift Academy</strong> 🚀<br />
        Pronto recibirás información en tu correo.
      </p>

      <a href="index.html" class="btn btn-primary"> Volver al inicio </a>
    </div>
  </body>
</html>
